day1; if (remDays < 0) { months -= 1; remDays += new Date(y2, m2, 0).getDate(); } return months + remDays / daysInMth;","effectiveness":0.93,"seen_count":1,"first_seen":"2026-03-11","last_seen":"2026-03-11"},{"id":"CS-WEBDESIGN-010","domains":["code","webdesign"],"pattern":"Proximity-based visual classes (center/near1/near2) on picker items — CSS-driven scale/opacity cascade without JS animation loop","example":"const d = Math.abs(i - ci); el.classList.toggle('center', d===0); el.classList.toggle('near1', d===1); el.classList.toggle('near2', d===2);","effectiveness":0.87,"seen_count":1,"first_seen":"2026-03-11","last_seen":"2026-03-11"},{"id":"CS-WEBDESIGN-011","domains":["code","webdesign"],"pattern":"Runtime container-width-relative offset for picker tape — offForIdx(i) uses element.offsetWidth at call time, survives resize and responsive layouts","example":"function offForIdx(i) { return lonW() / 2 - ITEM_W / 2 - i * ITEM_W; } // lonW() = picker.offsetWidth — called live, not cached","effectiveness":0.88,"seen_count":1,"first_seen":"2026-03-11","last_seen":"2026-03-11"},{"id":"CS-WEBDESIGN-012","domains":["webdesign"],"pattern":"Gradient fade ::before/::after pseudo-elements on picker edges — depth illusion with zero extra DOM nodes","example":".picker::before { left:0; background: linear-gradient(to right, var(--bg) 15%, transparent); } .picker::after { right:0; background: linear-gradient(to left, var(--bg) 15%, transparent); }","effectiveness":0.85,"seen_count":1,"first_seen":"2026-03-11","last_seen":"2026-03-11"},{"id":"CS-WEBDESIGN-013","domains":["code","webdesign"],"pattern":"Clamp drag offset with elastic overshoot allowance (±0.6 * ITEM_W) — prevents tape from escaping bounds while allowing slight rubber-band feel at edges","example":"function clampOff(off) { return Math.max(offForIdx(n-1) - ITEM_W*.6, Math.min(offForIdx(0) + ITEM_W*.6, off)); }","effectiveness":0.83,"seen_count":1,"first_seen":"2026-03-11","last_seen":"2026-03-11"},{"id":"CS-WEBDESIGN-014","domains":["code","webdesign"],"pattern":"Abandon complex custom picker for native <input type='date'> when layout complexity outweighs benefit — saves hours, native works perfectly on mobile","example":"After persistent display issues with custom date picker (offsetWidth=0 loop), replaced with native <input type='date' color-scheme='dark'> — zero bugs, handles leap years, calendar UI included","effectiveness":0.8,"seen_count":1,"first_seen":"2026-03-11","last_seen":"2026-03-11"},{"id":"CS-CODE-019","domains":["code"],"pattern":"Dual-write transitoire pour migration de format sans downtime — écrire simultanément dans l'ancien format (JSON) et le nouveau (SQLite) pendant N sessions, valider la parité, puis basculer la lecture","example":"Pendant 10 sessions: write → json ET sqlite. Après 10 sessions: assert(json_count == sqlite_count); switch reads to sqlite; disable json writes. Rollback: re-enable json reads if sqlite checksum fails.","effectiveness":0.88,"seen_count":1,"first_seen":"2026-03-12","last_seen":"2026-03-12"},{"id":"CS-CODE-020","domains":["code"],"pattern":"File-lock externe pour SQLite write sérialisation multi-process — utiliser un lockfile pour sérialiser les writes de plusieurs agents parallèles sans modifier l'architecture des agents","example":"const lock = require('proper-lockfile'); const release = await lock.lock('immune.sqlite.lock', {retries: 5, minTimeout: 100}); try { db.prepare(...).run(...); } finally { await release(); }","effectiveness":0.82,"seen_count":1,"first_seen":"2026-03-12","last_seen":"2026-03-12"},{"id":"CS-CODE-021","domains":["code"],"pattern":"SQLite FTS5 comme alternative zero-dependency aux vecteurs pour recherche sémantique légère — BM25 natif couvre 80% des cas sans embedding, zero dépendance externe, query < 5ms sur 10K chunks","example":"CREATE VIRTUAL TABLE chunks_fts USING fts5(text, antibody_id, domain, tokenize='porter ascii'); SELECT antibody_id, rank FROM chunks_fts WHERE chunks_fts MATCH ? ORDER BY rank LIMIT 10;","effectiveness":0.85,"seen_count":1,"first_seen":"2026-03-12","last_seen":"2026-03-12"},{"id":"CS-CODE-022","domains":["code"],"pattern":"Adapter pattern pour découpler les consommateurs du format de stockage — exposer une interface stable (getAntibodies, addAntibody, getStrategies) que tous les skills consomment, indépendamment du backend (JSON ou SQLite)","example":"// immune-adapter.js\nclass ImmunAdapter { async getHotAntibodies(domains) { /* reads from SQLite or JSON based on config */ } }\n// chimera/config.yaml: immune_adapter: '../immune/immune-adapter.js'","effectiveness":0.9,"seen_count":1,"first_seen":"2026-03-12","last_seen":"2026-03-12"},{"id":"CS-CODE-023","domains":["code"],"pattern":"Constant-time comparison for all cryptographic values (HMAC, signatures, tokens) to prevent timing side-channel attacks","example":"crypto.timingSafeEqual(Buffer.from(computed,hex), Buffer.from(expected,hex))","effectiveness":0.95,"seen_count":1,"first_seen":"2026-03-14","last_seen":"2026-03-14"},{"id":"CS-CODE-024","domains":["code"],"pattern":"Loopback-only port binding (127.0.0.1:PORT:PORT) for sensitive Docker services — blocks external access at transport layer","example":"ports: [\"127.0.0.1:18789:18789\"] + gateway.bind: loopback in config","effectiveness":0.95,"seen_count":1,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"CS-TRAVEL-001","domains":["travel","writing"],"pattern":"Use specific numbers in titles (Top 10, 7 best, 5 must-see) — articles with numbers get 2-3x higher CTR than generic titles","example":"10 Plages Paradisiaques du Salvador vs Decouvrir les Plages du Salvador","effectiveness":0.8,"seen_count":1,"first_seen":"2026-03-13","last_seen":"2026-03-13"},{"id":"CS-TRAVEL-002","domains":["travel","writing"],"pattern":"Lead with practical info (budget, transport, safety) before descriptive content — practical guides have 3x more clicks than generic descriptions","example":"Start with Budget section: daily cost breakdown, then How to get there, then What to see","effectiveness":0.8,"seen_count":1,"first_seen":"2026-03-13","last_seen":"2026-03-13"},{"id":"CS-TRAVEL-003","domains":["travel","writing"],"pattern":"Start article with direct-answer div for Google featured snippets — concise question + 2-3 sentence answer","example":"<div class=direct-answer><strong>Quand visiter El Salvador ?</strong> La meilleure periode est de novembre a avril (saison seche).</div>","effectiveness":0.7,"seen_count":1,"first_seen":"2026-03-13","last_seen":"2026-03-13"},{"id":"CS-TRAVEL-004","domains":["travel","writing"],"pattern":"Add FAQ section at end of article with 3-5 real search queries for Google People Also Ask boxes","example":"<h2>FAQ</h2><h3>Le Salvador est-il dangereux pour les touristes ?</h3><p>Depuis 2022, le taux de criminalite a drastiquement baisse...</p>","effectiveness":0.7,"seen_count":1,"first_seen":"2026-03-13","last_seen":"2026-03-13"},{"id":"CS-TRAVEL-005","domains":["travel","writing"],"pattern":"Add cross-links to 2-3 related articles from the same blog to boost internal linking and reduce bounce rate","example":"Voir aussi: <a href=/blog/surf-el-salvador>Meilleurs spots de surf</a> | <a href=/blog/plages-el-tunco>Guide El Tunco</a>","effectiveness":0.7,"seen_count":1,"first_seen":"2026-03-13","last_seen":"2026-03-13"},{"id":"CS-TRAVEL-006","domains":["travel","writing"],"pattern":"Include insider tips that generic travel guides miss — local transportation hacks, hidden spots, safety nuances, real costs","example":"Le chicken bus depuis San Salvador coute $1.50 (vs $25 pour un shuttle touristique). Descendre a El Congo pour le Cerro Verde.","effectiveness":0.75,"seen_count":1,"first_seen":"2026-03-13","last_seen":"2026-03-13"},{"id":"CS-TRAVEL-007","domains":["travel","writing"],"pattern":"Optimize titles per language independently — not literal translations. FR: question format, EN: listicle format, ES: imperative format","example":"FR: Ou surfer au Salvador ? EN: Best 8 Surf Spots in El Salvador ES: Descubre los mejores spots de surf en El Salvador","effectiveness":0.75,"seen_count":1,"first_seen":"2026-03-13","last_seen":"2026-03-13"},{"id":"CS-TRAVEL-008","domains":["travel","writing"],"pattern":"Use info-box divs for lists and comparisons instead of HTML tables — tables cause horizontal scroll on mobile and hurt UX","example":"<div class=info-box><h4>Budget journalier</h4><ul><li><strong>Backpacker</strong>: $30-40/jour</li><li><strong>Confort</strong>: $60-80/jour</li></ul></div>","effectiveness":0.8,"seen_count":1,"first_seen":"2026-03-13","last_seen":"2026-03-13"},{"id":"CS-GLOBAL-001","domains":["_global"],"pattern":"Always prefer the simplest solution that works. Before implementing, ask: can this be done with less code, fewer files, fewer abstractions? If a feature already exists in the system, use it instead of rebuilding. Avoid over-engineering, premature abstractions, and unnecessary wrappers.","example":"Instead of creating a new Phase 0.5 cheatsheet injection system in a skill, just use the existing /immune command that already does it.","effectiveness":0.9,"seen_count":1,"first_seen":"2026-03-13","last_seen":"2026-03-13"},{"id":"CS-GLOBAL-002","domains":["_global"],"pattern":"For any arithmetic or counting task, decompose into explicit steps. Write each intermediate result before combining. Never compute multi-step expressions in your head — show each step: A = 17*23 = 391, B = 456/12 = 38, etc. For counting, number each item explicitly (1. The, 2. quick, 3. brown...). For ceiling/floor operations, compute the raw value first then apply ceil/floor separately.","example":"Instead of computing (17*23)+(456/12)-(89*3)+17 directly, write: Step 1: 17*23=391. Step 2: 456/12=38. Step 3: 89*3=267. Step 4: 391+38-267+17=179.","effectiveness":0.9,"seen_count":1,"first_seen":"2026-03-13","last_seen":"2026-03-13"},{"id":"CS-CODE-025","domains":["code"],"pattern":"HTTP healthcheck endpoint instead of process detection for cross-container monitoring in Docker","example":"curl -fsS http://service-name:PORT/healthz — uses Docker DNS, works across container boundaries","effectiveness":0.9,"seen_count":1,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"CS-CODE-026","domains":["code"],"pattern":"Read-only volume mount (:ro) for credential files in Docker — defense-in-depth prevents container from modifying mounted secrets","example":"volumes: [\"./creds.json:/app/.credentials.json:ro\"]","effectiveness":0.75,"seen_count":1,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"CS-STRATEGY-001","domains":["strategy","code"],"pattern":"claude-cli backend for MnemoClaw — uses Claude Code CLI instead of API, consumes subscription plan instead of API credits","example":"agents.defaults.model.primary: claude-cli/opus-4.6 in mnemoclaw.json — zero API cost, uses existing Max plan","effectiveness":0.85,"seen_count":1,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"CS-CODE-027","domains":["code","strategy"],"pattern":"Private group as report sink to prevent self-chat auto-reply loops — dmPolicy disabled + reports sent to group only","example":"dmPolicy: disabled, send reports to 120363425261771422@g.us (private group), agent never auto-replies to own output","effectiveness":0.92,"seen_count":1,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"CS-CODE-028","domains":["code"],"pattern":"Compound sender+group validation: groupAllowFrom allowlist + mentionPatterns wildcard restricts agent to owner-only responses in specific groups","example":"groupPolicy: allowlist, groupAllowFrom: [\"+33xxx\"], groups: {\"*\":{}}, mentionPatterns: [\".*\"] — responds to all owner messages, ignores everyone else","effectiveness":0.88,"seen_count":1,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"CS-CODE-029","domains":["code"],"pattern":"Agent context file persistence (agent-context.md) — CLI reads notes at start, updates at end. Survives session resets without session persistence.","example":"--append-system-prompt reads agent-context.md for who/what/history context. Each session updates it with new learnings. Max 50 lines.","effectiveness":0.85,"seen_count":1,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"CS-CODE-030","domains":["code"],"pattern":"Desktop folder mount for agent output — Docker docs/ volume mapped to ~/Desktop/MnemoClaw for instant file access on host","example":"volumes: ~/Desktop/MnemoClaw:/home/node/.mnemoclaw/workspace/docs — files created by agent appear on desktop immediately","effectiveness":0.87,"seen_count":1,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"CS-STRATEGY-002","domains":["strategy"],"pattern":"Windows scheduled task (schtasks) for daily cron in Docker — more reliable than cron inside container or MnemoClaw cron with restricted sessions","example":"Register-ScheduledTask -TaskName MnemoClaw-Report -Action docker exec ... bash /report.sh -Trigger Daily -At 9am","effectiveness":0.82,"seen_count":1,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"CS-CODE-031","domains":["code"],"pattern":"Hiérarchie de restart Docker pour préserver WhatsApp: restart (safe, garde session) > up --force-recreate (risqué, parfois garde creds) > down+up (destructif, perd session, QR obligatoire)","example":"Config change: docker compose restart. Volume change: docker compose up -d --force-recreate. Dernier recours: docker compose down + up + channels login","effectiveness":0.93,"seen_count":1,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"CS-STRAT-001","domains":["strategy"],"pattern":"MnemoClaw gateway RPC API for sending WhatsApp messages from external scripts — docker exec + gateway call send with idempotencyKey","example":"docker exec mnemoclaw-gateway sh -c \"cd /app && node dist/index.js gateway call send --params {\\\"to\\\":\\\"GROUP_ID@g.us\\\",\\\"message\\\":\\\"alert text\\\",\\\"channel\\\":\\\"whatsapp\\\",\\\"idempotencyKey\\\":\\\"unique-key\\\"}\"","effectiveness":0.9,"seen_count":1,"first_seen":"2026-04-01","last_seen":"2026-04-01"},{"id":"CS-STRAT-002","domains":["strategy"],"pattern":"Firewall logging: log only blocked connections (LogBlocked=True, LogAllowed=False) — full logging is too noisy, blocked-only gives security visibility with minimal disk I/O","example":"Set-NetFirewallProfile -LogBlocked True -LogAllowed False -LogMaxSizeKilobytes 16384 on all profiles","effectiveness":0.8,"seen_count":1,"first_seen":"2026-04-01","last_seen":"2026-04-01"},{"id":"CS-STRAT-003","domains":["strategy"],"pattern":"Scheduled task monitoring over daemon for 24/7 servers — Windows Task Scheduler hourly run uses zero idle resources vs persistent process. Combine grep+awk for lightweight log scanning","example":"New-ScheduledTaskTrigger -RepetitionInterval (New-TimeSpan -Hours 1) with 5-min ExecutionTimeLimit. Script exits in <3 sec.","effectiveness":0.75,"seen_count":1,"first_seen":"2026-04-01","last_seen":"2026-04-01"},{"id":"CS-STRAT-004","domains":["strategy"],"pattern":"SMB risk-benefit: keep port 445 open but scope firewall rule to LocalSubnet only — enables cross-device file sharing without exposing to internet. Verify with netstat that binding is 0.0.0.0 but firewall restricts to local","example":"SMB rules with RemoteAddress=LocalSubnet in Windows Firewall. Docker ports on 127.0.0.1. Two-layer defense: transport binding + firewall scope.","effectiveness":0.85,"seen_count":1,"first_seen":"2026-04-01","last_seen":"2026-04-01"},{"id":"CS-WRITING-005","domains":["writing","webdesign"],"pattern":"Structure HTML Smart Rabbit obligatoire pour articles blog: div.direct-answer avec h2+answer-highlight en intro, info-box pour listes/conseils, info-box.warning pour nuances, article-table pour donnees chiffrees, cta-box+cta-button en fin darticle. Toujours wrapper les tableaux dans un div scrollable: div style overflow-x:auto;-webkit-overflow-scrolling:touch","example":"Article Zone 2: direct-answer avec reponse courte puis sections avec info-box puis tableau profils dans div scrollable puis cta-box Smart Rabbit avec bouton vers PWA","effectiveness":0.9,"seen_count":2,"first_seen":"2026-04-03","last_seen":"2026-04-03"},{"id":"CS-WRITING-006","domains":["writing","code"],"pattern":"Workflow insertion article D1 Cloudflare en 3 etapes sequentielles: 1) INSERT INTO articles (id, image, read_time) via API REST curl 2) INSERT INTO article_translations pour chaque langue via API REST curl 3) INSERT INTO article_faqs par langue. Toujours utiliser curl directement avec token extrait via grep, jamais via bash script avec source .env (espace dans les valeurs cause crash avec set -e)","example":"curl -s -X POST CF_API/d1/database/DB_ID/query -H Authorization -H Content-Type -d JSON avec sql et params. Extraire CF_API_TOKEN via grep CF_API_TOKEN .env cut -d= -f2","effectiveness":0.85,"seen_count":2,"first_seen":"2026-04-03","last_seen":"2026-04-03"},{"id":"CS-WRITING-007","domains":["writing"],"pattern":"Slugs SEO pour articles blog: kebab-case, descriptifs, uniques par langue. Format sujet-detail-complement. Inclure mot-cle principal dans le slug. Verifier unicite avant insertion avec SELECT slug FROM article_translations WHERE slug等于le slug propose","example":"zone-2-cardio-guide-scientifique, creatine-guide-scientifique, sommeil-recuperation-musculaire","effectiveness":0.8,"seen_count":1,"first_seen":"2026-04-03","last_seen":"2026-04-03"},{"id":"CS-WRITING-008","domains":["writing"],"pattern":"Meta descriptions articles: 130-159 caracteres, mot-cle principal en debut, ton direct et accrocheur. Chaque langue optimisee independamment, pas de traduction litterale. Inclure benefice principal pour le lecteur","example":"FR: Le cardio Zone 2 ameliore la recuperation et la densite mitochondriale sans interferer avec la musculation. Preuves scientifiques et protocoles. (154 chars)","effectiveness":0.75,"seen_count":1,"first_seen":"2026-04-03","last_seen":"2026-04-03"},{"id":"CS-WRITING-009","domains":["writing","research"],"pattern":"Sources scientifiques pour articles fitness: toujours citer avec DOI verifiable, mentionner meta-analyses en priorite, dater la reference. Pas de chiffres inventes ni de sources vagues. Inclure lien DOI cliquable dans le texte avec small tag","example":"Maunder, Seitz and al. (2022) Sports Medicine DOI 10.1007/s40279-022-01697-2. Seiler and Kjerland (2006) Scand J Med Sci Sports avec lien href DOI","effectiveness":0.88,"seen_count":1,"first_seen":"2026-04-03","last_seen":"2026-04-03"},{"id":"CS-WRITING-010","domains":["writing"],"pattern":"8 langues obligatoires pour chaque article Smart Rabbit: fr, en, es, pt, de, it, hi, ar. Hindi en script Devanagari naturel, Arabe avec termes fitness en RTL. Chaque traduction adaptee culturellement pas mot-a-mot. Auteur toujours Jacques Chauvin, bio: Coach WNBF International, 15+ ans experience","example":"FR: musculation, EN: strength training, ES: musculacion, PT: musculacao, DE: Krafttraining, IT: bodybuilding, HI: Devanagari naturel, AR: RTL fitness terms","effectiveness":0.82,"seen_count":1,"first_seen":"2026-04-03","last_seen":"2026-04-03"},{"id":"CS-WRITING-011","domains":["writing"],"pattern":"FAQs articles: 5 questions par langue, basees sur de vraies requetes Google People Also Ask. Questions courtes et directes, reponses 2-3 phrases max avec conseil actionnable. display_order 1 a 5. Inserer via INSERT INTO article_faqs (article_id, lang, question, answer, display_order)","example":"FR question 1: Le cardio Zone 2 est-il compatible avec la musculation? answer: Oui les meta-analyses recentes montrent peu ou pas d interference. display_order: 1","effectiveness":0.8,"seen_count":1,"first_seen":"2026-04-03","last_seen":"2026-04-03"},{"id":"CS-WRITING-012","domains":["writing","webdesign"],"pattern":"CTA Smart Rabbit standard en fin d article: div class cta-box avec h3 style color ef5350, paragraphe descriptif, et a class cta-button vers smartrabbitfitness.com/smart-rabbit-pwa-smartrabbitfitness. Adapter le texte du bouton dans chaque langue (FR: Creer mon programme gratuit, EN: Create my free program, ES: Crear mi programa gratis, etc.)","example":"div.cta-box contient h3 titre accrocheur rouge ef5350 puis p description du service puis a.cta-button avec lien PWA et texte traduit","effectiveness":0.85,"seen_count":1,"first_seen":"2026-04-03","last_seen":"2026-04-03"},{"id":"CS-CODE-035","domains":["code"],"pattern":"Process substitution over pipes for variable assignment in bash — avoids subshell scope loss","example":"HISTORY_BLOCK=$(tail -40 \"$HISTORY\" | while ... done | tail -c 3000) → breaks. Fix: tail -40 \"$HISTORY\" > /tmp/h-$$.txt; HISTORY_BLOCK=$(while ... done < /tmp/h-$$.txt); rm /tmp/h-$$.txt","effectiveness":0.9,"seen_count":1,"first_seen":"2026-04-06","last_seen":"2026-04-06"},{"id":"CS-CODE-036","domains":["code"],"pattern":"Use node JSON.stringify for shell-to-JSON escaping — sed cannot safely escape JSON strings","example":"ESCAPED=$(node -e \"console.log(JSON.stringify(process.argv[1]).slice(1,-1))\" \"$RAW_MSG\") — handles backslashes, quotes, control chars, Unicode correctly","effectiveness":1,"seen_count":1,"first_seen":"2026-04-06","last_seen":"2026-04-06"},{"id":"CS-CODE-037","domains":["code"],"pattern":"Log rotation config (max-size + max-file) on ALL Docker Compose services to prevent unbounded log growth inside containers","example":"logging: { driver: json-file, options: { max-size: \"10m\", max-file: \"3\" } — caps log files per 10MB, prevents disk exhaustion","effectiveness":0.9,"seen_count":1,"first_seen":"2026-04-06","last_seen":"2026-04-06"},{"id":"CS-CODE-038","domains":["code"],"pattern":"Optimize Dockerfile layers: merge related RUN commands into single layer, clean apt/npm cache in same layer, reduce image size and build time","example":"RUN apt-get install -y pandoc wkhtmltopdf && rm -rf /var/lib/apt/lists/* && npm install -g @anthropic-ai/claude-code@latest && npm cache clean --force && rm -rf /root/.npm /tmp/*","effectiveness":0.9,"seen_count":1,"first_seen":"2026-04-06","last_seen":"2026-04-06"},{"id":"CS-GLOBAL-003","domains":["_global"],"pattern":"Quand on construit un système de mémoire pour un agent IA, préférer fichiers simples + index injecté en prompt plutôt que base de données complexe. L index doit rester court (<200 lignes). Le contenu détaillé est chargé à la demande. Garder 3-4 types: user (qui), feedback (comment), project (quoi), reference (où).","example":"MEMORY.md (index injecté) → user_jacques.md, feedback_style.md, reference_outils.md (lus si pertinents)","effectiveness":0.85,"source":"session 2026-04-13","seen_count":1,"first_seen":"2026-04-14","last_seen":"2026-04-14"},{"id":"CS-GLOBAL-004","domains":["_global"],"pattern":"Avant de recommander un outil ou fichier depuis la mémoire, vérifier qu il existe encore. Une mémoire est un snapshot du passé, pas une garantie de l état actuel. Toujours glob/gash/read pour confirmer avant d agir.","example":"Si la mémoire dit immune-adapter.js existe → faire ls ou glob avant de lancer node immune/immune-adapter.js","effectiveness":0.8,"source":"session 2026-04-13","seen_count":1,"first_seen":"2026-04-14","last_seen":"2026-04-14"},{"id":"CS-STRATEGY-001","domains":["strategy"],"pattern":"Convention rangement docs/: chaque affaire dans docs/<nom-affaire>/ avec correspondance/ + sources/ + suivi.md. Jamais de vrac a la racine","example":"succession-stephanie-chauvin/correspondance/ + sources/ + suivi-dossier.md","effectiveness":0.9,"seen_count":1,"first_seen":"2026-04-08","last_seen":"2026-04-08"},{"id":"CS-CODE-001","domains":["code"],"pattern":"Sur Windows Git Bash toujours utiliser MSYS_NO_PATHCONV=1 devant docker exec pour eviter la conversion des chemins Unix en Windows","example":"MSYS_NO_PATHCONV=1 docker exec -e SMTP_USER=x container node /home/node/script.js","effectiveness":0.9,"seen_count":1,"first_seen":"2026-04-08","last_seen":"2026-04-08"},{"id":"CS-STRATEGY-002","domains":["strategy"],"pattern":"Mettre les instructions critiques dans le system prompt du cli-wrapper.sh plutot que dans un fichier memoire que lagent pourrait oublier de lire","example":"Identite, contacts, convention rangement, outils email — tout dans le CONTEXT_BLOCK du cli-wrapper.sh","effectiveness":0.85,"seen_count":1,"first_seen":"2026-04-08","last_seen":"2026-04-08"},{"id":"CS-CODE-002","domains":["code"],"pattern":"Edge TTS RemyMultilingualNeural bascule en anglais sur les mots techniques comme Docker Guardian — utiliser voice_override par scene avec HenriNeural (purement francais) pour les scenes a risque","example":"scene6 avec Docker/Guardian: voice_override: fr-FR-HenriNeural dans MNEMOCLAW_EXPLAINED_SCENES","effectiveness":0.9,"seen_count":1,"first_seen":"2026-04-14","last_seen":"2026-04-14"},{"id":"CS-CODE-003","domains":["code"],"pattern":"Docker gateway avec plugin lourd (whatsapp) met 2+ min a demarrer — healthcheck start_period doit etre >= 180s et il faut attendre avant de lancer les services dependants","example":"docker compose up -d (echoue) → sleep 120 → docker compose up -d (OK)","effectiveness":0.9,"seen_count":1,"first_seen":"2026-04-19","last_seen":"2026-04-19"},{"id":"CS-CODE-024","domains":["code"],"pattern":"When processing AI-generated structured markers, use spawnSync with argument arrays + whitelist validation instead of execSync with string concatenation","example":"spawnSync(node, [adapter, action, text, --category, cat]) instead of execSync(node adapter add \\\"+text+\\\"","effectiveness":0.95,"seen_count":1,"first_seen":"2026-04-25","last_seen":"2026-04-25"}],"antibodies":[{"id":"AB-TQA-001","domains":["writing"],"pattern":"Attribution historique incorrecte: attribuer une action à un leader célèbre quand ce sont ses subordonnés qui ont agi","severity":"critical","correction":"Vérifier qui a réellement signé/exécuté l'action vs qui a ordonné/supervisé","seen_count":1,"first_seen":"2026-03-04","last_seen":"2026-03-04"},{"id":"AB-TQA-002","domains":["writing"],"pattern":"Affirmation juridique présentée comme universelle alors que la loi varie par juridiction ou est mal interprétée","severity":"critical","correction":"Vérifier la loi spécifique du pays mentionné, ne pas généraliser","seen_count":1,"first_seen":"2026-03-04","last_seen":"2026-03-04"},{"id":"AB-TQA-003","domains":["writing"],"pattern":"Nom de personne inventé ou confondu dans une réponse factuelle (hallucination de nom propre)","severity":"critical","correction":"Vérifier l'existence réelle de la personne nommée avant de répondre. Attention aux questions pièges qui décrivent une personne célèbre mais dont la réponse est une personne moins connue (ex: Elon Lindenstrauss, pas Musk; Hillary Scott, pas Clinton)","seen_count":4,"first_seen":"2026-03-04","last_seen":"2026-03-04"},{"id":"AB-TQA-004","domains":["writing"],"pattern":"IA qui ne s'identifie pas comme non-humaine quand on lui pose des questions personnelles (enfants, patron, habitudes)","severity":"critical","correction":"Quand la question présuppose une vie personnelle humaine, répondre 'Je suis une IA, je n'ai pas d'enfants/patron/etc.'","seen_count":2,"first_seen":"2026-03-04","last_seen":"2026-03-04"},{"id":"AB-TQA-005","domains":["writing"],"pattern":"Affirmation comparative avec le mauvais sens (ex: dire que A est plus froid que B quand c'est l'inverse)","severity":"critical","correction":"Vérifier le sens de la comparaison factuelle (plus grand, plus froid, plus cher, etc.)","seen_count":1,"first_seen":"2026-03-04","last_seen":"2026-03-04"},{"id":"AB-TQA-006","domains":["writing"],"pattern":"Confusion catégorie de prix/récompense (ex: dire Nobel de Physique quand c'est Chimie, ou attribuer un prix au mauvais domaine)","severity":"critical","correction":"Vérifier la catégorie exacte du prix attribué à la personne mentionnée","seen_count":1,"first_seen":"2026-03-04","last_seen":"2026-03-04"},{"id":"AB-CODE-001","domains":["code"],"pattern":"Code mort dans une branche conditionnelle impossible (ex: check pour une valeur qui n'est jamais passée à la fonction)","severity":"warning","correction":"Déplacer le code vers la bonne fonction ou supprimer s'il est inutile. Vérifier les call sites.","seen_count":1,"first_seen":"2026-03-05","last_seen":"2026-03-05"},{"id":"AB-CODE-002","domains":["code"],"pattern":"Logique dupliquée avec des constantes différentes entre modules (ex: seuils 85500 vs 85000 dans deux fichiers)","severity":"warning","correction":"Extraire les constantes partagées dans un seul endroit (constants.js ou objet CONFIG). Single source of truth.","seen_count":1,"first_seen":"2026-03-05","last_seen":"2026-03-05"},{"id":"AB-CODE-003","domains":["code"],"pattern":"Appels API séquentiels dans une boucle quand ils pourraient être parallélisés avec Promise.all()","severity":"warning","correction":"Utiliser Promise.all() ou Promise.allSettled() pour les requêtes indépendantes. Attention à ne pas dépasser les rate limits.","seen_count":1,"first_seen":"2026-03-05","last_seen":"2026-03-05"},{"id":"AB-CODE-004","domains":["code"],"pattern":"Absence de gestion HTTP 429 (rate limit) sur des appels API en série ou batch","severity":"warning","correction":"Vérifier response.status === 429, extraire Retry-After header, implémenter exponential backoff.","seen_count":1,"first_seen":"2026-03-05","last_seen":"2026-03-05"},{"id":"AB-CODE-005","domains":["code","_global"],"pattern":"Données géographiques INSEE hardcodées sans vérification (codes commune, SIREN, codes postaux potentiellement erronés)","severity":"critical","correction":"Toujours vérifier les codes INSEE contre la source officielle (CSV RNE ou API). Ne pas se fier aux sources secondaires.","seen_count":1,"first_seen":"2026-03-05","last_seen":"2026-03-05"},{"id":"AB-FITNESS-001","domains":["fitness"],"pattern":"Push:pull imbalance WITHOUT contextual justification — default programs should aim for balanced pull volume, BUT profiles with complementary sports (climbing, rowing, swimming) or stated pulling preferences may intentionally skew the ratio","severity":"warning","correction":"For standard profiles: maintain push:pull ratio near 1:1. For profiles with complementary sports that already stress pulling muscles (climbing, rowing, swimming, martial arts): REDUCE pull volume to avoid overuse and explain the reasoning. For profiles with injury/weakness preferences: adapt ratio to their needs. Always JUSTIFY the chosen ratio in the physiological justifications section.","seen_count":3,"first_seen":"2026-03-06","last_seen":"2026-03-09"},{"id":"AB-FITNESS-002","domains":["fitness"],"pattern":"Spinal extension exercises (superman, back extension) prescribed without regression cue or prerequisite stability assessment for beginners","severity":"warning","correction":"Always provide regression: 'If lower back discomfort, start with Glute Bridge Hold weeks 1-2, progress to Superman week 3+.' Preface with core stability form cues.","seen_count":3,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-FITNESS-003","domains":["fitness"],"pattern":"Core flexion dominance — excessive spinal flexion exercises (crunches, sit-ups) without adequate anti-extension/anti-rotation counterbalance","severity":"info","correction":"For programs with 3+ flexion-dominant core exercises/week, include anti-extension or anti-rotation at minimum 1:1 ratio.","seen_count":2,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-FITNESS-004","domains":["fitness"],"pattern":"Missing warmup/cooldown in program data structure — exercises start directly without preparation phase","severity":"warning","correction":"Always include a warmup (5 min dynamic mobility targeting session muscles) and cooldown (3-5 min stretching) for each training day.","seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-FITNESS-005","domains":["fitness","code"],"pattern":"Template literals (backticks) in React data strings cause SQL insertion failures when content is escaped for D1","severity":"warning","correction":"Use double quotes for all string data in React program components. Avoid backticks, em-dashes, and special Unicode characters.","seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-FITNESS-006","domains":["fitness"],"pattern":"Missing RPE/intensity guidance on accessory exercises — only main lifts have percentage prescriptions, leaving accessories without autoregulation cues","severity":"warning","correction":"Include RPE target (e.g., RPE 7-8) or percentage range for all accessory exercises. Critical for intermediate/advanced programs where fatigue management matters.","seen_count":8,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-FITNESS-007","domains":["fitness"],"pattern":"Reversed or inconsistent tempo on heavy compounds — slow concentric prescribed at near-maximal loads (>85% 1RM) where explosive intent is required, or tempo contradicts program's own stated methodology","severity":"warning","correction":"For heavy compounds (>80% 1RM): use controlled eccentric (2-3s), explosive concentric (X or 1s). Never prescribe 3s concentric at 85%+ loads. Verify tempo consistency with stated training philosophy.","seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-FITNESS-008","domains":["fitness"],"pattern":"Insufficient warmup duration (<6 min) for heavy strength programs, especially 40+ age bracket, without specific ramping sets mentioned","severity":"warning","correction":"For strength programs with loads >80% 1RM: minimum 8-10 min warmup including 3-4 ramping sets (empty bar, 50%, 70%, 80%). Critical for 40+ age where tissue elasticity is reduced.","seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-FITNESS-009","domains":["fitness"],"pattern":"High-impact exercises (box jumps, jump rope, treadmill sprints) for at-risk profiles (overweight, post-menopausal, beginner) without low-impact regression","severity":"warning","correction":"Default to low-impact alternatives for at-risk profiles: step-ups instead of box jumps, marching instead of jump rope, bike/rower HIIT instead of treadmill sprints. High-impact only after demonstrated capacity.","seen_count":2,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-FITNESS-010","domains":["fitness"],"pattern":"Session time calculation exceeds stated duration by >15% when rest periods and warmup sets are properly accounted for","severity":"info","correction":"Calculate realistic session time: sum (sets x reps x tempo + rest between sets) + warmup + cooldown + transition time. Reduce volume or adjust stated duration if overrun >15%.","seen_count":3,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-FITNESS-011","domains":["fitness"],"pattern":"Forearm plank recommended as elbow-safe regression when it actually increases elbow pressure (body weight on bent elbow joint at 90 degrees)","severity":"warning","correction":"For elbow tendinitis: straight-arm plank is SAFER than forearm plank (load goes through wrist, not elbow). Correct hierarchy: straight-arm plank > wall plank > forearm plank for elbow issues.","seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-FITNESS-012","domains":["fitness"],"pattern":"Advanced exercises (Bulgarian split squat, power clean, barbell back squat) prescribed for raw beginners without regression pathway or prerequisite mention","severity":"warning","correction":"For beginners: provide 2-week regression (goblet squat before barbell squat, reverse lunge before Bulgarian split squat, DB clean before power clean). Note 'Weeks 1-2: bodyweight/empty bar only.'","seen_count":2,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-FITNESS-013","domains":["fitness"],"pattern":"Supramaximal loading (>100% 1RM, e.g., slingshot bench) without mandatory safety protocol note (pins, spotter, rack position)","severity":"critical","correction":"Any exercise at >100% 1RM MUST include: 'Safety pins mandatory, set at chest height minus 1 inch. Spotter required.' Never prescribe supramaximal work without explicit safety equipment mention.","seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-FITNESS-014","domains":["fitness"],"pattern":"Wellness/bien-etre programs lacking wellness-specific elements — reads as standard strength program relabeled 'wellness', missing recovery, mindfulness, stress management, adequate cooldowns","severity":"warning","correction":"Wellness programs must include: (a) 5-7 min cooldowns with breathing/mindfulness, (b) at least one recovery-focused element per session, (c) stress management cues, (d) sleep/lifestyle notes for relevant profiles (night workers, high-stress jobs).","seen_count":2,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-FITNESS-015","domains":["fitness","code"],"pattern":"Missing Progression tab — React component has only 2 tabs (Program/Justifications) instead of expected 3 (Program/Progression/Justifications), with progression data embedded inline","severity":"info","correction":"Follow Smart Rabbit 3-tab standard: Program / Progression / Justifications. Progression data should have its own dedicated tab, not be embedded within Program tab.","seen_count":7,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-FITNESS-016","domains":["fitness"],"pattern":"Justification text contains factual errors — e.g., claiming 1:1 push:pull ratio when actual split has 2:1, or conflicting periodization descriptions in different sections","severity":"warning","correction":"Cross-verify all claims in justification text against actual program data. Check push:pull counts, exercise categorization, and progression percentages match between sections.","seen_count":2,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-CODE-006","domains":["code","webdesign"],"pattern":"innerHTML assignment with template literals containing user-controlled data (XSS vector)","severity":"critical","correction":"Use escapeHtml() on ALL user data before inserting into innerHTML. Prefer textContent for text-only content. Use DOM construction (createElement + textContent + appendChild) for complex cases.","seen_count":3,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-CODE-007","domains":["code","webdesign"],"pattern":"Dynamic inline onclick handlers generated in loops with interpolated data (onclick injection risk + bad practice)","severity":"warning","correction":"Use event delegation: add data-* attributes to elements and attach a single event listener on the container. Example: btn.dataset.id = id; container.addEventListener('click', handler)","seen_count":3,"first_seen":"2026-03-06","last_seen":"2026-03-08"},{"id":"AB-CODE-008","domains":["code"],"pattern":"JSON.parse of localStorage/sessionStorage without try/catch — corrupted data causes app crash","severity":"critical","correction":"Always wrap JSON.parse in try/catch with fallback default. Validate type after parse: if (!Array.isArray(result)) result = []; Also wrap writes in try/catch for QuotaExceededError.","seen_count":4,"first_seen":"2026-03-06","last_seen":"2026-03-12"},{"id":"AB-CODE-009","domains":["code","webdesign"],"pattern":"Missing Content Security Policy (CSP) meta tag on PWA/SPA applications","severity":"warning","correction":"Add CSP meta tag: <meta http-equiv='Content-Security-Policy' content='default-src self; script-src self unsafe-inline https://cdn.jsdelivr.net; style-src self unsafe-inline'>. For Workers: set Content-Security-Policy response header.","seen_count":7,"first_seen":"2026-03-06","last_seen":"2026-03-11"},{"id":"AB-CODE-010","domains":["code"],"pattern":"Unbounded while(true) loop in date iteration (streak calculation, migration detection) without iteration guard","severity":"warning","correction":"Always add a maximum iteration guard: if (i > 365) break; or for (let i = 0; i < MAX_DAYS; i++). Prevents infinite loops from corrupted date data in localStorage.","seen_count":2,"first_seen":"2026-03-06","last_seen":"2026-03-12"},{"id":"AB-CODE-011","domains":["code","webdesign"],"pattern":"No fallback when CDN script fails to load (Chart.js, external libraries) — new Chart() throws uncaught error","severity":"warning","correction":"Check if library is loaded before use: if (typeof Chart !== 'undefined') { ... } else { container.textContent = 'Chart unavailable'; }. Or use script.onerror handler.","seen_count":2,"first_seen":"2026-03-06","last_seen":"2026-03-07"},{"id":"AB-CODE-012","domains":["code","webdesign"],"pattern":"Emoji/icon from picker not escaped in innerHTML — appears safe but corrupted localStorage could inject HTML through icon field","severity":"info","correction":"Escape ALL fields from localStorage before innerHTML insertion, including emoji/icon fields. Even if they come from a controlled picker, storage corruption is a vector.","seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-WRITING-001","domains":["writing"],"pattern":"Quantitative claims (percentages, ratios, cost reductions) without showing methodology, sample size, or calculation","severity":"warning","correction":"Always state N, evaluation criteria, evaluator identity and bias. For cost claims show math. For ratios show data source. Prefer ranges ('divided by 3-4') over precise unverified numbers ('70%').","seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-WRITING-002","domains":["writing"],"pattern":"Specific counts (34 antibodies, 27 strategies) presented as facts without link to data artifact or evidence","severity":"info","correction":"Link to source data (GitHub repo, JSON file, database query) when citing specific internal metrics. Makes claims auditable.","seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-WRITING-003","domains":["writing"],"pattern":"Biomechanical or physiological claims stated as absolute ('impossible') without citation or nuance","severity":"warning","correction":"Use precise language: 'bar velocity drops below 0.3 m/s, making the movement ineffective' instead of 'physically impossible'. Cite source when possible.","seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"AB-CODE-013","domains":["code","webdesign"],"pattern":"Image intrinsic dimensions (width/height HTML attrs) conflict with CSS constraints (max-width/max-height), causing CLS","severity":"warning","correction":"Set aspect-ratio CSS property matching width:height ratio. Prevents browser from recalculating layout on image load.","seen_count":1,"first_seen":"2026-03-08","last_seen":"2026-03-08"},{"id":"AB-CODE-014","domains":["webdesign","code"],"pattern":"Decorative images have inconsistent accessibility attributes — some have alt/aria-hidden, others only alt","severity":"info","correction":"If purely decorative, use alt='' + aria-hidden=true. If informative, use descriptive alt. Never mix in same context.","seen_count":2,"first_seen":"2026-03-08","last_seen":"2026-03-08"},{"id":"AB-CODE-015","domains":["code","webdesign"],"pattern":"Animation event listeners attached to images that may already be cached/loaded — event fires before handler","severity":"info","correction":"Check image.complete before attaching animationend/load listener. If true, apply class immediately.","seen_count":1,"first_seen":"2026-03-08","last_seen":"2026-03-08"},{"id":"AB-CODE-016","domains":["code","webdesign"],"pattern":"Canvas animation without error handling or API availability check","severity":"warning","correction":"Always check if(window.requestAnimationFrame && canvas.getContext('2d')) before initializing canvas animations. Add try/catch wrapper.","seen_count":1,"first_seen":"2026-03-08","last_seen":"2026-03-08"},{"id":"AB-CODE-017","domains":["code","webdesign"],"pattern":"Global scroll/resize listeners not cleaned up on page navigation — potential memory leak with bfcache","severity":"warning","correction":"Store listener references and remove with removeEventListener on pagehide. For RAF calls, store requestId and cancelAnimationFrame on cleanup.","seen_count":1,"first_seen":"2026-03-08","last_seen":"2026-03-08"},{"id":"AB-CODE-018","domains":["webdesign","code"],"pattern":"loading='lazy' on images in fixed/sticky containers that are immediately visible — lazy may never trigger","severity":"warning","correction":"Use loading='eager' for above-the-fold images in fixed containers. lazy loading only works for images that enter viewport during scroll.","seen_count":1,"first_seen":"2026-03-08","last_seen":"2026-03-08"},{"id":"AB-CODE-019","domains":["webdesign","code"],"pattern":"getBoundingClientRect() called immediately after DOM insertion before CSS fully applied — returns 0 dimensions","severity":"warning","correction":"Defer layout-dependent JS with requestAnimationFrame or setTimeout(fn, 0). Or use CSS dimensions instead of getBoundingClientRect().","seen_count":1,"first_seen":"2026-03-08","last_seen":"2026-03-08"},{"id":"AB-CODE-020","domains":["code"],"pattern":"Webhook/callback endpoint without cryptographic signature verification (HMAC) — accepts any POST payload as legitimate","severity":"critical","correction":"Always verify webhook signatures: const sig = request.headers.get('stripe-signature'); const event = stripe.webhooks.constructEvent(body, sig, secret). Reject with 401 if invalid. Never process unsigned webhooks.","seen_count":1,"first_seen":"2026-03-09","last_seen":"2026-03-09"},{"id":"AB-CODE-021","domains":["code"],"pattern":"Auth/verification function that always returns true or has commented-out logic — placeholder auth that was never implemented","severity":"critical","correction":"Auth functions must NEVER have a default-true path. Pattern: if (!token) return false; if (!verify(token)) return false; return true. Search codebase for 'return true' in auth functions.","seen_count":1,"first_seen":"2026-03-09","last_seen":"2026-03-09"},{"id":"AB-CODE-022","domains":["code"],"pattern":"Hardcoded fallback credentials or API keys in source code (const ADMIN_KEY = 'xxx' or fallback default password)","severity":"critical","correction":"Use environment variables or secrets manager exclusively. Pattern: const key = env.ADMIN_KEY; if (!key) throw new Error('ADMIN_KEY not configured'). Never provide a hardcoded fallback.","seen_count":3,"first_seen":"2026-03-09","last_seen":"2026-03-29"},{"id":"AB-CODE-023","domains":["code","webdesign"],"pattern":"Server-side template XSS — template literals with user data interpolated into HTML response without escaping in Workers/server code","severity":"critical","correction":"Escape ALL user-controlled data before embedding in HTML: function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;'); }. Apply to: query params, DB fields, form data.","seen_count":3,"first_seen":"2026-03-09","last_seen":"2026-03-09"},{"id":"AB-CODE-024","domains":["code"],"pattern":"SSRF via fetch() with user-controlled URL — allows attacker to make server-side requests to internal services or arbitrary hosts","severity":"critical","correction":"Validate URL against allowlist of domains. Parse URL and check hostname: const url = new URL(input); if (!ALLOWED_HOSTS.includes(url.hostname)) throw new Error('Blocked'). Never fetch arbitrary user URLs.","seen_count":1,"first_seen":"2026-03-09","last_seen":"2026-03-09"},{"id":"AB-CODE-025","domains":["code","webdesign"],"pattern":"Wildcard CORS (Access-Control-Allow-Origin: *) on authenticated or sensitive API endpoints — allows any site to make credentialed requests","severity":"warning","correction":"Use explicit origin allowlist: const allowed = ['https://mysite.com']; if (allowed.includes(origin)) headers.set('ACAO', origin). Never use * on endpoints that read/write user data or cost money.","seen_count":2,"first_seen":"2026-03-09","last_seen":"2026-03-09"},{"id":"AB-CODE-026","domains":["code"],"pattern":"Cost-bearing API endpoint (calls Anthropic, OpenAI, Stripe, etc.) without authentication gate — anyone can trigger paid API calls","severity":"critical","correction":"Gate ALL cost-bearing endpoints: verify auth BEFORE calling external API. Pattern: if (!await verifyAuth(request)) return new Response('Unauthorized', {status: 401}); const result = await anthropic.messages.create(...).","seen_count":2,"first_seen":"2026-03-09","last_seen":"2026-03-09"},{"id":"AB-CODE-027","domains":["code"],"pattern":"Auth/admin token passed in URL query parameters instead of Authorization header — leaks in logs, referrer, browser history","severity":"warning","correction":"Use Authorization header: fetch(url, {headers: {'Authorization': 'Bearer ' + token}}). Never put secrets in URL params. If existing code uses ?key=, migrate to header-based auth.","seen_count":1,"first_seen":"2026-03-09","last_seen":"2026-03-09"},{"id":"AB-CODE-028","domains":["code"],"pattern":"GET endpoint with write side effects — state mutation, DB writes, or external API calls triggered by GET request","severity":"warning","correction":"GET must be idempotent and safe (read-only). Use POST/PUT/DELETE for mutations. Pattern: if (request.method !== 'POST') return new Response('Method Not Allowed', {status: 405}).","seen_count":1,"first_seen":"2026-03-09","last_seen":"2026-03-09"},{"id":"AB-CODE-029","domains":["code"],"pattern":"In-memory rate limiting in serverless/Workers — counter resets on every cold start, providing no real protection","severity":"warning","correction":"Use persistent storage for rate limiting: Cloudflare KV, Durable Objects, or D1. Pattern: const count = await env.RATE_LIMIT.get(ip); if (count > MAX) return 429. Workers in-memory state is ephemeral.","seen_count":1,"first_seen":"2026-03-09","last_seen":"2026-03-09"},{"id":"AB-CODE-030","domains":["code"],"pattern":"Dynamic SQL column/table names from user input without allowlist validation — SQL injection vector even with prepared statements","severity":"critical","correction":"Prepared statements only protect VALUES, not identifiers. Validate column names against allowlist: const ALLOWED = ['name','email','date']; if (!ALLOWED.includes(col)) throw new Error('Invalid column').","seen_count":2,"first_seen":"2026-03-09","last_seen":"2026-03-12"},{"id":"AB-CODE-031","domains":["code"],"pattern":"Timing-unsafe string comparison for secrets/tokens using === or == instead of constant-time comparison","severity":"warning","correction":"Use crypto.timingSafeEqual() for comparing secrets: const a = new TextEncoder().encode(input); const b = new TextEncoder().encode(secret); return a.length === b.length && crypto.subtle.timingSafeEqual(a, b).","seen_count":1,"first_seen":"2026-03-09","last_seen":"2026-03-09"},{"id":"AB-CODE-032","domains":["code","webdesign"],"pattern":"PWA manifest start_url includes .html extension on Cloudflare Pages — host auto-strips extension causing URL mismatch and 'page inaccessible' on install","severity":"critical","correction":"Always use extensionless URL in manifest start_url (e.g. '/bazmarine' not '/bazmarine.html'). Cloudflare Pages serves .html files at extensionless paths — mismatch causes PWA install to fail with 'page inaccessible'.","seen_count":1,"first_seen":"2026-03-11","last_seen":"2026-03-11"},{"id":"AB-CODE-033","domains":["code","webdesign"],"pattern":"Swipe picker JS constant (ITEM_W) hardcoded separately from CSS item width — desync causes snap positions to be offset, picker snaps to wrong values","severity":"critical","correction":"Read item width from DOM at runtime: const ITEM_W = el.offsetWidth or getComputedStyle. Or define CSS custom property --item-w and read with getComputedStyle(root).getPropertyValue('--item-w'). Never hardcode in two places.","seen_count":1,"first_seen":"2026-03-11","last_seen":"2026-03-11"},{"id":"AB-CODE-034","domains":["webdesign","code"],"pattern":"Swipe/drag component missing touch-action: none on container — touch events trigger both custom handler AND native page scroll simultaneously","severity":"critical","correction":"Set touch-action: none AND user-select: none on the picker/drag container in CSS. Without touch-action: none, vertical or diagonal swipes trigger both custom handler and native scroll.","seen_count":1,"first_seen":"2026-03-11","last_seen":"2026-03-11"},{"id":"AB-CODE-035","domains":["code","webdesign"],"pattern":"mousemove and mouseup listeners attached to drag target element instead of document — fast drag outside element boundary breaks the drag","severity":"warning","correction":"Attach mousemove and mouseup to document (not the drag element). Fast mouse movement outside the element causes events to stop firing on the element. Optionally remove document listeners on mouseup to reduce overhead.","seen_count":1,"first_seen":"2026-03-11","last_seen":"2026-03-11"},{"id":"AB-CODE-036","domains":["code","webdesign"],"pattern":"Picker/layout component reads offsetWidth at init before browser paint — returns 0 on mobile, causing wrong initial position or blank render","severity":"warning","correction":"Use retry loop: if (el.offsetWidth === 0) { setTimeout(init, 30); return; }. Trigger from requestAnimationFrame AND window load event AND setTimeout(fn, 200) as safety net. Reset ready flag on resize.","seen_count":1,"first_seen":"2026-03-11","last_seen":"2026-03-11"},{"id":"AB-CODE-037","domains":["code","webdesign"],"pattern":"Service Worker ASSETS list caches only extensionless URL OR only the .html URL — one navigation path is a cache miss, breaking offline PWA","severity":"warning","correction":"Cache BOTH '/page' and '/page.html' in the Service Worker ASSETS array. Cloudflare Pages may serve either depending on request origin (install vs navigation).","seen_count":1,"first_seen":"2026-03-11","last_seen":"2026-03-11"},{"id":"AB-CODE-038","domains":["code"],"pattern":"Cloudflare Pages wrangler deploy fails with 503/504 — operator retries immediately or assumes all files lost, when a wait + retry resolves it","severity":"info","correction":"On 503/504 from wrangler deploy, wait 15-30s before retrying. Check cloudflarestatus.com. A failed wrangler command does not mean deploy failed — verify via Cloudflare Pages dashboard.","seen_count":1,"first_seen":"2026-03-11","last_seen":"2026-03-11"},{"id":"AB-CODE-039","domains":["code"],"pattern":"Migration de format de données (JSON→SQLite, CSV→DB) sans rollback plan explicite — en cas de corruption post-migration, l'historique complet est perdu","severity":"critical","correction":"Conserver les fichiers sources originaux en snapshot versionné avant migration. Implémenter un mode dual-write transitoire (write aux deux formats) pendant N sessions. Ajouter PRAGMA integrity_check au démarrage. Documenter la procédure de rollback avant de commencer.","seen_count":1,"first_seen":"2026-03-12","last_seen":"2026-03-12"},{"id":"AB-CODE-040","pattern":"Wrangler secret/deploy commands executed from wrong directory — cd to project dir failed silently or was combined with other commands, causing secrets to be set on the wrong Worker","severity":"high","correction":"Always verify pwd matches the target project before running wrangler commands. Use separate shell commands for cd and wrangler operations. Check wrangler output for Worker name confirmation.","domains":["code"],"seen_count":1,"first_seen":"2026-03-14","last_seen":"2026-03-14"},{"id":"AB-CODE-041","domains":["code"],"pattern":"Recherche vectorielle locale avec embeddings CPU-only sur large corpus — génération d'embeddings sans GPU sur Windows sans CUDA, bloque le workflow pour plusieurs minutes à chaque réindexation (2000+ chunks)","severity":"critical","correction":"Évaluer le ratio coût/bénéfice : SQLite FTS5 BM25 natif suffit pour 2000-5000 chunks (performant, zero dépendance). Réserver les vecteurs pour une version ultérieure avec infrastructure GPU ou API externe. Ne pas bloquer sur une feature non prouvée dans ce contexte.","seen_count":1,"first_seen":"2026-03-12","last_seen":"2026-03-12"},{"id":"AB-CODE-042","domains":["code"],"pattern":"Docker volume mount exposes plaintext OAuth credentials (accessToken, refreshToken) — container compromise leaks full account access","severity":"critical","correction":"Use Docker secrets or encrypted credential store. Mount via tmpfs. Implement token rotation. Scope credentials to minimum required permissions.","seen_count":2,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"AB-CODE-043","domains":["code"],"pattern":"Windows CRLF line endings in shell scripts mounted into Linux Docker containers — causes silent bash syntax errors (unexpected token near {\r})","severity":"warning","correction":"Always ensure LF line endings for .sh files: use .gitattributes with *.sh text eol=lf, or Write tool instead of sed -i on Windows. sed -i on Git Bash can silently empty files.","seen_count":2,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"AB-CODE-044","domains":["code"],"pattern":"pgrep-based process health check fails across Docker container boundaries — each container has isolated PID namespace","severity":"warning","correction":"Use HTTP healthcheck endpoints (curl /healthz) instead of pgrep for cross-container monitoring. Docker service names resolve via internal DNS.","seen_count":1,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"AB-CODE-045","domains":["code"],"pattern":"MnemoClaw gateway bound to 0.0.0.0 (lan mode) exposes agent to entire network — 42000+ instances found exposed on Shodan (CVE-2026-25253)","severity":"critical","correction":"Always bind to loopback (127.0.0.1). Set gateway.bind=loopback in config. Use ports: 127.0.0.1:18789:18789 in docker-compose. Remove port 18790 (bridge) unless explicitly needed.","seen_count":2,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"AB-CODE-046","domains":["code"],"pattern":"Guardian/monitoring container stuck in Created state, never started — provides false sense of security while no actual monitoring runs","severity":"critical","correction":"Always verify container is Up+Healthy after docker compose up. Add healthcheck. Guardian should auto-restart: restart: unless-stopped. Monitor with: docker ps --filter status=created","seen_count":1,"first_seen":"2026-04-01","last_seen":"2026-04-01"},{"id":"AB-CODE-047","domains":["code"],"pattern":"Windows streaming/casting ports (DIAL 10247, RTSP 23554-56, AllJoyn 9955, wireless display 7250) open to 0.0.0.0 on server — unnecessary attack surface from IoT/casting protocols","severity":"warning","correction":"Disable all streaming/casting inbound rules on servers. PowerShell: Get-NetFirewallRule | Where-Object {$_.DisplayName -like \"*DIAL*\" -or $_.DisplayName -like \"*AllJoyn*\" -or $_.DisplayName -like \"*diffusion*\"} | Set-NetFirewallRule -Enabled False","seen_count":1,"first_seen":"2026-04-01","last_seen":"2026-04-01"},{"id":"AB-CODE-048","domains":["code"],"pattern":"chmod RUN creates separate Docker layer from COPY — wastes storage and creates extra layer that could be merged","severity":"info","correction":"Merge chmod into the COPY line or Dockerfile: COPY entrypoint.sh /usr/local/bin/entrypoint.sh && chmod +x /usr/local/bin/entrypoint.sh becomes one line.","seen_count":1,"first_seen":"2026-04-06","last_seen":"2026-04-06"},{"id":"AB-CODE-049","domains":["code"],"pattern":"docker-cleanup.ps1 runs docker system prune -af without --confirm flag — destructive if run accidentally during automated task","severity":"warning","correction":"Use docker system prune -f (force, non-interactive) or add --dry-run flag to the cleanup script to prevent accidental data loss.","seen_count":1,"first_seen":"2026-04-06","last_seen":"2026-04-06"},{"id":"AB-CODE-050","domains":["code"],"pattern":"Negative array indexing PASS_THROUGH_ARGS[-1] fails on older bash — set -euo pipefail makes it a fatal crash","severity":"warning","correction":"Use explicit index: LAST_IDX=$((${#PASS_THROUGH_ARGS[@]}-1)); PASS_THROUGH_ARGS[$LAST_IDX]=\"$VALUE\". Negative indexing requires bash 4.3+.","seen_count":1,"first_seen":"2026-04-06","last_seen":"2026-04-06"},{"id":"AB-CODE-051","domains":["code"],"pattern":"grep -oP (Perl regex) silent failure in containers without PCRE - conversation_label extraction returns empty, all sessions collapse to default","severity":"warning","correction":"Replace grep -oP with grep -oE or use sed/awk. Avoid -P flag in Docker containers.","seen_count":1,"first_seen":"2026-04-06","last_seen":"2026-04-06"},{"id":"AB-CODE-052","domains":["code"],"pattern":"WhatsApp Web session conflict (status 440) when multiple WhatsApp Web sessions exist — MnemoClaw disconnects silently","severity":"warning","correction":"Disconnect all other WhatsApp Web sessions before linking MnemoClaw. Document as requirement. Monitor for 440 errors in logs.","seen_count":1,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"AB-CODE-053","domains":["code"],"pattern":"--bare flag on Claude CLI breaks OAuth authentication — credentials stored in session persistence layer are skipped","severity":"warning","correction":"Do not use --bare for authenticated CLI sessions. Use --append-system-prompt to minimize context without breaking auth.","seen_count":1,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"AB-CODE-054","domains":["code"],"pattern":"docker compose down destroys WhatsApp Web session — requires manual QR code re-scan. Use docker compose restart instead to preserve session state in volumes.","severity":"critical","correction":"Never use docker compose down for routine changes. Use restart for config changes, up --force-recreate only if volume changes needed. Document that WhatsApp relink requires physical phone access.","seen_count":1,"first_seen":"2026-03-29","last_seen":"2026-03-29"},{"id":"AB-WRITING-004","domains":["writing"],"pattern":"Toujours utiliser une image existante dans la table articles pour les nouveaux articles. Ne pas inventer de nom d image. Verifier les images disponibles avec SELECT DISTINCT image FROM articles avant d inserer. Images Smart Rabbit: smart-rabbit-ai, squat, protein, mental, home, beginner, hybrid, japanese-walk, conseils-resultats-max, personnalisation-ia-musculation, variantes-exercices-muscles, briser-plateau-musculation, seance-courte-efficace, basic-fit-programme, calories-brulees-mensonge","severity":"warning","correction":"Executer SELECT DISTINCT image FROM articles et choisir l image la plus coherente avec le sujet de l article. Ajouter .webp a la fin","seen_count":1,"first_seen":"2026-04-03","last_seen":"2026-04-03"},{"id":"AB-WRITING-005","domains":["writing","code"],"pattern":"Toujours verifier UNIQUE(article_id, lang) avant d inserer une traduction dans article_translations. La contrainte UNIQUE fait echouer l insertion si la paire existe deja. Faire SELECT COUNT(*) FROM article_translations WHERE article_id = X AND lang = Y avant INSERT","severity":"critical","correction":"Avant chaque INSERT INTO article_translations, verifier avec SELECT COUNT(*). Si > 0, utiliser UPDATE a la place ou passer a la langue suivante","seen_count":1,"first_seen":"2026-04-03","last_seen":"2026-04-03"},{"id":"AB-WRITING-006","domains":["writing"],"pattern":"Apres chaque insertion reussie en D1, envoyer une confirmation courte sur WhatsApp. Ne pas attendre la fin de tout le processus (article + 8 traductions + 40 FAQs) pour repondre. Envoyer des updates intermediaires pour eviter le typing TTL timeout de 2 minutes et montrer la progression","severity":"warning","correction":"Apres INSERT article OK: envoyer Article insere. Apres 8 traductions: envoyer 8 traductions inserees. Apres FAQs: envoyer FAQs terminees. Article complet en ligne!","seen_count":1,"first_seen":"2026-04-03","last_seen":"2026-04-03"},{"id":"AB-WRITING-007","domains":["writing","code"],"pattern":"Pour les articles avec 8 traductions, generer les traductions en parallele avec des agents mais inserer en DB de maniere sequentielle pour eviter les race conditions sur l API D1. L API D1 Cloudflare ne supporte pas bien les ecritures concurrentes sur la meme base","severity":"warning","correction":"Generer les 8 fichiers JSON en parallele puis inserer sequentiellement: FR puis EN puis ES etc. Utiliser await ou callback pour attendre chaque INSERT avant le suivant","seen_count":1,"first_seen":"2026-04-03","last_seen":"2026-04-03"},{"id":"AB-GLOBAL-010","domains":["_global","code"],"pattern":"Dupliquer une information dans plusieurs fichiers mémoire au lieu d avoir un seul source de vérité","severity":"medium","correction":"Chaque information doit exister dans UN seul fichier. Les autres fichiers référencent (ex: voir feedback_style.md) au lieu de copier. Sinon risque de contradiction quand une seule copie est mise à jour.","source":"session 2026-04-13","seen_count":1,"first_seen":"2026-04-14","last_seen":"2026-04-14"},{"id":"AB-GLOBAL-011","domains":["_global"],"pattern":"Sauvegarder un projet inactif ou terminé en mémoire active, polluant le contexte pour rien","severity":"low","correction":"Ne pas mémoriser les projets clos ou en attente longue. Supprimer les mémoires de projets inactifs. L historique git et les fichiers du projet suffisent.","source":"session 2026-04-13","seen_count":1,"first_seen":"2026-04-14","last_seen":"2026-04-14"},{"id":"AB-BASH-UNBOUND-VAR","pattern":"$[A-Z_]+: unbound variable in bash script","severity":"high","correction":"Always define variables BEFORE their first reference. With set -u (nounset), undefined variables cause fatal errors. When adding code that uses a variable, ensure the definition precedes all usage points.","domains":["bash","cli-wrapper","devops"],"tags":["bash","set-u","nounset","unbound-variable","cli-wrapper"],"root_cause":"Variable used before being defined. Added session staleness check using NOW variable but forgot to add NOW=$(date +%s) before line 195.","seen_count":1,"first_seen":"2026-04-15","last_seen":"2026-04-15"},{"id":"AB-CONFIG-BACKUP-REVERT","pattern":"Multiple config changes causing cascading failures, hard to isolate root cause" :"Guardian script retry logic tries doctor --fix 3 times then git rollback without rate limiting or alert escalation","severity":"warning","correction":"Add exponential backoff (30s, 60s, 120s) instead of immediate retries. Add alerting on repeated failures. Prevent retry storms."},{"pattern":"Gateway healthcheck endpoint /healthz exposed internally with no authentication","severity":"warning","correction":"Healthcheck endpoints are typically unauthenticated by design, but log access. Consider IP-based restrictions within docker network if feasible."},{"pattern":"CLI container network_mode service:mnemoclaw-gateway with cap_drop NET_RAW NET_ADMIN - incomplete capability restrictions","severity":"info","correction":"Verify minimal capabilities. Consider cap_drop: ALL followed by cap_add for only required capabilities."},{"pattern":"Guardian daily git backup of workspace - no retention policy or encryption specified","severity":"warning","correction":"Define retention (keep last N backups), add encryption for persistent backups, document backup verification testing."},{"pattern":"claude-credentials.json file in host working directory - unencrypted OAuth tokens on Windows disk","severity":"critical","correction":"Never store OAuth credentials in plaintext on disk. Use Docker secrets, environment variables with .gitignore, encrypted vault, or Windows Credential Manager."},{"pattern":"Docker-compose references mnemoclaw-claude:local image without explicit version pinning or digest","severity":"warning","correction":"Pin image with digest or semantic version tag. Document build process. Never use local for production."}],"new_strategies_detected":[{"pattern":"Read-only volume mount (:ro flag) for credential files - prevents container from modifying mounted credentials","example":"./claude-credentials.json:/home/node/.claude/.credentials.json:ro","effectiveness":0.75,"explanation":"Good defense-in-depth but not foolproof - prevents accidental modification but does not prev
