<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mnemo — Immune Memory Visualization</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

@keyframes pulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.02); }
}
@keyframes breathe {
  0%, 100% { filter: blur(0px); }
  50% { filter: blur(0.5px); }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

body {
  background: #0a0a0f;
  color: #e0e0e0;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  overflow-x: hidden;
}

/* Organic background */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(79, 195, 247, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(171, 71, 188, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(102, 187, 106, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 60%, rgba(255, 167, 38, 0.03) 0%, transparent 40%);
  z-index: -1;
  animation: breathe 8s ease-in-out infinite;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 30px 20px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 40px;
  animation: fadeIn 1s ease;
}
.header h1 {
  font-size: 2.5em;
  font-weight: 200;
  letter-spacing: 0.1em;
  background: linear-gradient(135deg, #4fc3f7, #ab47bc, #66bb6a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
}
.header .subtitle {
  font-size: 1em;
  color: #666;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

/* Stats Grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px;
  margin-bottom: 40px;
  animation: fadeIn 1s ease 0.2s both;
}
.stat-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: all 0.3s ease;
}
.stat-card:hover {
  background: rgba(255,255,255,0.06);
  border-color: rgba(255,255,255,0.12);
  transform: translateY(-2px);
}
.stat-card .glow {
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  border-radius: 50%;
  opacity: 0.05;
}
.stat-card .value {
  font-size: 2.8em;
  font-weight: 100;
  letter-spacing: -0.02em;
  position: relative;
  opacity: 1;
}
.stat-card .label {
  font-size: 0.75em;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-top: 4px;
}

/* Section */
.section {
  margin-bottom: 50px;
  animation: fadeIn 1s ease 0.4s both;
}
.section-title {
  font-size: 1.4em;
  font-weight: 300;
  margin-bottom: 20px;
  color: #aaa;
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-title .icon {
  font-size: 1.2em;
}

/* Nebula */
#nebula {
  width: 100%;
  height: 550px;
  border-radius: 20px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.04);
  position: relative;
  overflow: hidden;
}
#nebula svg { width: 100%; height: 100%; }

/* Tooltip */
.tooltip {
  position: fixed;
  background: rgba(15, 15, 25, 0.95);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 0.85em;
  max-width: 350px;
  pointer-events: none;
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.2s ease;
  backdrop-filter: blur(10px);
}
.tooltip.visible { opacity: 1; }
.tooltip .tt-id { font-weight: 600; margin-bottom: 4px; }
.tooltip .tt-type { font-size: 0.8em; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.6; }
.tooltip .tt-pattern { margin-top: 8px; line-height: 1.5; color: #bbb; }
.tooltip .tt-domains { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
.tooltip .tt-domain {
  font-size: 0.7em;
  padding: 2px 8px;
  border-radius: 8px;
  background: rgba(255,255,255,0.08);
}

/* Timeline */
#timeline {
  width: 100%;
  height: 300px;
  border-radius: 20px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.04);
}

/* Domain bars */
.domain-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 16px;
}
.domain-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 20px;
  transition: all 0.3s ease;
}
.domain-card:hover { background: rgba(255,255,255,0.05); }
.domain-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.domain-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  box-shadow: 0 0 10px currentColor;
}
.domain-name { font-weight: 500; text-transform: capitalize; }
.domain-count { margin-left: auto; font-size: 0.8em; color: #888; }
.bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 0.8em; }
.bar-label { width: 80px; color: #888; text-align: right; }
.bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
.bar-value { width: 40px; color: #888; }

/* Memory graph */
#memory-graph {
  width: 100%;
  height: 450px;
  border-radius: 20px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.04);
  position: relative;
  overflow: hidden;
}
#memory-graph svg { width: 100%; height: 100%; }

/* Memory wall */
.memory-wall {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}
.memory-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 14px;
  padding: 18px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.memory-card:hover { background: rgba(255,255,255,0.05); transform: translateY(-1px); }
.memory-card .mc-type {
  font-size: 0.65em;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  padding: 2px 8px;
  border-radius: 6px;
  display: inline-block;
  margin-bottom: 8px;
}
.memory-card .mc-name { font-weight: 500; margin-bottom: 6px; font-size: 0.95em; }
.memory-card .mc-desc { font-size: 0.8em; color: #888; line-height: 1.5; }
.memory-card .mc-glow {
  position: absolute;
  top: 0; right: 0;
  width: 80px; height: 80px;
  border-radius: 50%;
  opacity: 0.05;
  transform: translate(30%, -30%);
}

/* Legend */
.legend {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  font-size: 0.8em;
  color: #888;
}
.legend-item { display: flex; align-items: center; gap: 6px; }
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}

/* Footer */
.footer {
  text-align: center;
  padding: 40px 0 20px;
  color: #444;
  font-size: 0.75em;
  letter-spacing: 0.1em;
}

/* Responsive */
@media (max-width: 768px) {
  .header h1 { font-size: 1.8em; }
  #nebula { height: 400px; }
  #timeline { height: 250px; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Mnemo</h1>
    <div class="subtitle">Immune Memory System &mdash; Live Visualization</div>
  </div>

  <div class="stats-grid" id="stats"></div>

  <div class="section">
    <div class="section-title"><span class="icon">&#x1F9EC;</span> Domain Nebula</div>
    <div class="legend" id="nebula-legend"></div>
    <div id="nebula"></div>
  </div>

  <div class="section">
    <div class="section-title"><span class="icon">&#x1F4C8;</span> Growth Timeline</div>
    <div id="timeline"></div>
  </div>

  <div class="section">
    <div class="section-title"><span class="icon">&#x1F4CA;</span> Domain Breakdown</div>
    <div class="domain-grid" id="domains"></div>
  </div>

  <div class="section">
    <div class="section-title"><span class="icon">&#x1F9E0;</span> Memory Network</div>
    <div id="memory-graph"></div>
  </div>

  <div class="section">
    <div class="section-title"><span class="icon">&#x1F4C4;</span> Memory Cards</div>
    <div class="memory-wall" id="claude-memories"></div>
  </div>

  <div class="section">
    <div class="section-title"><span class="icon">&#x1F504;</span> Context Logs</div>
    <div id="context-logs"></div>
  </div>

  <div class="footer">
    Mnemo v4.1 &bull; Immune + Cheatsheet + Context + Claude Memory &bull; Generated 2026-05-18
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const DATA = {"strategies":[{"id":"CS-CODE-001","domains":["code"],"pattern":"Échapper le HTML via l'API DOM (document.createElement + textContent) au lieu de regex/replace","example":"escapeHtml(str) { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }","effectiveness":0.87,"seen_count":3,"first_seen":"2026-03-05","last_seen":"2026-03-06"},{"id":"CS-CODE-002","domains":["code"],"pattern":"Chart.js instance lifecycle management — destroy before recreate OR use update pattern (preferred)","example":"Preferred: if (chart) { chart.data = newData; chart.update(); } else { chart = new Chart(ctx, config); }. Alternative: if (chart) { chart.destroy(); chart = null; } chart = new Chart(ctx, config);","effectiveness":0.76,"seen_count":2,"first_seen":"2026-03-05","last_seen":"2026-03-06"},{"id":"CS-CODE-003","domains":["code"],"pattern":"Cache sessionStorage pour les réponses API avec clé préfixée (éviter collisions)","example":"sessionStorage.setItem('ec_' + key, JSON.stringify(data)) avec try/catch pour quota dépassé","effectiveness":0.7,"seen_count":1,"first_seen":"2026-03-05","last_seen":"2026-03-05"},{"id":"CS-FITNESS-001","domains":["fitness"],"pattern":"User preference integration with compound prioritization — honor stated exercise preferences while ensuring compounds lead each session","example":"Profile likes squats, no burpees → squats placed as primary Day 1+2 (sumo variant), burpees excluded entirely, mountain climbers as metabolic alternative.","effectiveness":0.85,"seen_count":3,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-FITNESS-002","domains":["fitness"],"pattern":"Exercise sequencing by dominance emphasis rotation within full-body format","example":"Day 1: Lower-focus (Squats→Lunges→Bridges→Push-ups). Day 2: Upper-focus (Push-ups→Sumo Squats→Superman→Dips). Day 3: Balanced. Prevents monotony while maintaining full-body stimulus.","effectiveness":0.8,"seen_count":3,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-FITNESS-003","domains":["fitness"],"pattern":"Include deload week in progression cycle (typically week 6-7, 40% volume reduction)","example":"Week 7 deload: reduce volume by 40%, maintain tempos, focus on mobility/recovery. Supports CNS recovery, reduces overtraining risk.","effectiveness":0.88,"seen_count":5,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-FITNESS-004","domains":["fitness"],"pattern":"Tempo differentiation by exercise class — compound vs isometric vs isolation","example":"Compound lifts: 5-6s tempos (3s ecc, 1s pause, 2s con). Isometric holds: static. Dynamic/isolation: 3s tempos. Explosive concentric (X) for heavy strength >80% 1RM.","effectiveness":0.78,"seen_count":3,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-FITNESS-005","domains":["fitness"],"pattern":"Rep range periodization within single session — higher reps for compounds, lower for accessories (or inverted for strength goals)","example":"Beginner weight loss: 15 reps (squats) → 12 reps (lunges) → 10 reps (push-ups). Strength: 3-5 reps (primaries) → 8-12 reps (accessories).","effectiveness":0.75,"seen_count":3,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-FITNESS-006","domains":["fitness"],"pattern":"Dedicated safety protocol box for profiles with injuries/limitations — visually distinct section explaining all exercise modifications","example":"Red-bordered box listing: barbell OHP removed (replaced by landmine press), incline pressing avoided, face pulls every pull day, stop-if-sharp-pain rule.","effectiveness":0.84,"seen_count":2,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-FITNESS-007","domains":["fitness","code"],"pattern":"Sub-component decomposition for React fitness programs — separate ExerciseCard, DayPanel, ProgressionTable components","example":"function ExerciseCard({ ex }) with priority border color, name, sets x reps, tempo, rest, technique badge, and note.","effectiveness":0.78,"seen_count":4,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-FITNESS-008","domains":["fitness"],"pattern":"Lift-specific wave loading back-off patterns — vary the wave structure per lift based on CNS recovery cost","example":"Bench: ascending-descending 72/77/82/82/77%. Squat: plateau 70/75/80/80/80%. Deadlift: peak-backoff 75/80/85/85/80%.","effectiveness":0.82,"seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-FITNESS-009","domains":["fitness"],"pattern":"Anti-movement core training dominance for strength — prioritize anti-rotation, anti-extension, anti-lateral flexion over spinal flexion","example":"Pallof Press, Ab Wheel Rollout, Copenhagen Plank, Suitcase Carry. Ratio 5:1 anti-movement:flexion for spine stability under load.","effectiveness":0.86,"seen_count":5,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-FITNESS-010","domains":["fitness"],"pattern":"Occupation/lifestyle-aware exercise rationale in technique fields — tie exercise choices to user's job, daily activities, and specific physical demands","example":"Night bartender: 'Counteract hip flexor tightness from standing shifts', 'Spinal stability for long shift protection', 'Shoulder strength for bartending'. PE teacher: 'Setting example for students'.","effectiveness":0.83,"seen_count":2,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-FITNESS-011","domains":["fitness"],"pattern":"Mind-muscle connection (MMC) cue embedded in every exercise note for beginner/technique-focus profiles","example":"Each exercise note includes: 'feel quads+glutes consciously', 'squeeze pecs at top', 'feel hamstrings stretch'. Unified tempo with documented 'EMG increase' justification.","effectiveness":0.85,"seen_count":2,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-FITNESS-012","domains":["fitness"],"pattern":"Core anti-movement plane rotation across days — each session targets a different stability plane","example":"Day A: anti-extension (Plank). Day B: anti-rotation (Bird Dog). Day C: anti-lateral flexion (Side Plank). Full coverage across 3 sessions.","effectiveness":0.8,"seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-FITNESS-013","domains":["fitness"],"pattern":"Post-strength LISS cardio for fat-oxidation window in weight loss programs — 20 min low-intensity after resistance training","example":"After strength work: 20 min bike or elliptical at 65-70% HR max. Exploits post-resistance fat-oxidation window. Different machines each session for variety.","effectiveness":0.8,"seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-FITNESS-014","domains":["fitness"],"pattern":"Session-specific warmup and cooldown matching primary muscles — not generic warmup for all days","example":"Squat day: hip circles + leg swings. Pull day: band pull-aparts + thoracic rotations. Push day: shoulder circles + push-up hold. Cooldown stretches match session muscles.","effectiveness":0.82,"seen_count":3,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-FITNESS-015","domains":["fitness"],"pattern":"Antagonist superset pairing for time efficiency on isolation accessories","example":"Bicep curl + skull crusher superset saves ~5 min per session. Cable fly + face pull superset. No rest penalty since antagonist muscles recover during agonist work.","effectiveness":0.78,"seen_count":2,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-FITNESS-016","domains":["fitness"],"pattern":"CrossFit benchmark WODs as built-in progress tracking — use named WODs (Fran, Cindy) for automatic comparability across training weeks","example":"W1-2: establish baseline Fran time. W3-4: beat W1-2 scores. W5: deload. W6: retest benchmarks. Athletes already know these WODs and care about scores.","effectiveness":0.78,"seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-FITNESS-017","domains":["fitness"],"pattern":"Menopause/age-specific exercise justification linking each exercise to its physiological benefit mechanism","example":"Each exercise note explains: 'Axial loading through femur stimulates osteoblasts' (squat), 'Ground reaction force 3-5x bodyweight' (step-ups), 'Fall prevention via proprioception' (single-leg balance).","effectiveness":0.82,"seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-CODE-004","domains":["code","webdesign"],"pattern":"Event delegation with data-action attributes instead of inline onclick in dynamically generated HTML","example":"container.addEventListener('click', e => { const btn = e.target.closest('[data-action]'); if (btn) handleAction(btn.dataset.action, btn.dataset.id); });","effectiveness":0.7,"seen_count":2,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-CODE-005","domains":["code"],"pattern":"Schema validation on localStorage reads with per-entry field validation and type guards","example":"let habits = []; try { const raw = JSON.parse(localStorage.getItem('hf_habits') || '[]'); if (Array.isArray(raw)) habits = raw.filter(h => typeof h.id === 'string' && typeof h.name === 'string'); } catch { habits = []; }","effectiveness":0.72,"seen_count":2,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-CODE-006","domains":["code"],"pattern":"Centralized init() function orchestrating all app setup (loadData, applyTheme, render, registerSW, initEventListeners) called from DOMContentLoaded","example":"document.addEventListener('DOMContentLoaded', () => { loadData(); applyDarkMode(); renderToday(); injectManifest(); registerSW(); initEventListeners(); });","effectiveness":0.5,"seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-CODE-007","domains":["code"],"pattern":"Single centralized state object instead of scattered global variables for app state management","example":"const state = { habits: [], logs: {}, notes: {}, settings: { dark: false } }; function saveData() { localStorage.setItem('app_state', JSON.stringify(state)); }","effectiveness":0.5,"seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-CODE-008","domains":["code","webdesign"],"pattern":"Centralized initEventListeners() function grouping ALL event bindings in one auditable place","example":"function initEventListeners() { /* all tab clicks, form submits, toggles, delegated handlers in one place */ }","effectiveness":0.5,"seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-CODE-009","domains":["code","webdesign"],"pattern":"Auto-save text inputs with debounce instead of manual save button — reduces friction","example":"let saveTimer; textarea.addEventListener('input', () => { clearTimeout(saveTimer); saveTimer = setTimeout(() => saveNote(dateKey, textarea.value), 600); });","effectiveness":0.5,"seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-CODE-010","domains":["code","webdesign"],"pattern":"ARIA roles and keyboard navigation for PWA accessibility (role=grid, role=listitem, tabindex, Enter/Space handlers)","example":"card.setAttribute('role', 'listitem'); card.setAttribute('tabindex', '0'); card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') toggle(id); });","effectiveness":0.5,"seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-WRITING-001","domains":["writing","fitness"],"pattern":"Framing AI limitations as feature not bug — honest constraints section increases credibility more than perfect claims","example":"Section 'L'honnêteté sur les limites' listing: AI doesn't replace coach, 34 patterns don't cover everything, quality depends on input, no longitudinal tracking yet.","effectiveness":0.92,"seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-WRITING-002","domains":["writing"],"pattern":"Open-source transparency as credibility marketing — sharing frameworks on GitHub proves seriousness better than claims","example":"'Je développe mes outils en open source. Les frameworks sont sur GitHub. Le système immunitaire est documenté.'","effectiveness":0.88,"seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-WRITING-003","domains":["writing","fitness"],"pattern":"Concrete error rates validate claims better than generic 'improved quality' — use real production numbers","example":"'Sur les programmes analysés, des problèmes ont été détectés dans près d'un cas sur deux' vs 'la qualité a été améliorée'","effectiveness":0.85,"seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-WRITING-004","domains":["writing","webdesign"],"pattern":"Direct-answer div with immediate credential establishes authority — question/answer format with expertise signal in first 4 lines","example":"<div class='direct-answer'><p>Question: L'IA peut-elle...</p><p>Réponse: Oui, mais... [credential: coach diplômé d'État]</p></div>","effectiveness":0.83,"seen_count":1,"first_seen":"2026-03-06","last_seen":"2026-03-06"},{"id":"CS-CODE-011","domains":["code","webdesign"],"pattern":"Mobile-first CSS Grid layout with responsive breakpoints — repeat(N, 1fr) at desktop, 1fr at mobile via @media","example":".kpi-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; } @media (max-width: 768px) { .kpi-row { grid-template-columns: 1fr; } }","effectiveness":0.5,"seen_count":1,"first_seen":"2026-03-07","last_seen":"2026-03-07"},{"id":"CS-WEBDESIGN-001","domains":["code","webdesign"],"pattern":"Explicit Chart.js color theming for dark backgrounds — set Chart.defaults.color, gridColor, tickColor globally instead of per-chart","example":"Chart.defaults.color = '#8892b0'; const gridColor = 'rgba(255,255,255,0.06)'; // reuse in all chart options.scales","effectiveness":0.5,"seen_count":1,"first_seen":"2026-03-07","last_seen":"2026-03-07"},{"id":"CS-WEBDESIGN-002","domains":["webdesign","code"],"pattern":"Prioritized hero image loading with fetchpriority=high + deferred lazy loading for secondary images","example":"Hero: fetchpriority='high' + preload. Secondary: loading='lazy' + decoding='async' + R2 CDN","effectiveness":0.89,"seen_count":2,"first_seen":"2026-03-08","last_seen":"2026-03-08"},{"id":"CS-WEBDESIGN-003","domains":["code","webdesign"],"pattern":"RequestAnimationFrame throttling with ticking flag to batch scroll events for parallax","example":"if (!ticking) { requestAnimationFrame(updateParallax); ticking = true; } — passive: true on scroll listener","effectiveness":0.856,"seen_count":2,"first_seen":"2026-03-08","last_seen":"2026-03-08"},{"id":"CS-WEBDESIGN-004","domains":["code","webdesign"],"pattern":"IntersectionObserver + unobserve for one-shot scroll-triggered animations","example":"observer.observe(el) → on isIntersecting: add 'visible' class + unobserve (fires once, memory friendly)","effectiveness":0.88,"seen_count":1,"first_seen":"2026-03-08","last_seen":"2026-03-08"},{"id":"CS-WEBDESIGN-005","domains":["code","webdesign"],"pattern":"Passive event listeners on high-frequency scroll handlers for browser optimization","example":"window.addEventListener('scroll', handler, { passive: true }) — lets browser optimize scrolling","effectiveness":0.9,"seen_count":1,"first_seen":"2026-03-08","last_seen":"2026-03-08"},{"id":"CS-WEBDESIGN-006","domains":["webdesign","code"],"pattern":"Scroll-indexed shape morphing via modulo cycling — border-radius changes triggered by Math.floor(scrollY / interval) % shapes.length","example":"var idx = Math.floor(scrollY / 120) % shapes.length; btn.style.borderRadius = shapes[idx].br; — 10 organic blob shapes with unique box-shadows","effectiveness":0.75,"seen_count":1,"first_seen":"2026-03-08","last_seen":"2026-03-08"},{"id":"CS-WEBDESIGN-007","domains":["webdesign","code"],"pattern":"CSS class toggle (active/waiting) instead of display:none for scroll-driven visibility — preserves CSS transitions on reentry","example":".stack-item.active .carousel-img { opacity:1; transform:translateX(0); } .stack-item.waiting .carousel-img { opacity:0; transform:translateX(-120%); }","effectiveness":0.8,"seen_count":1,"first_seen":"2026-03-08","last_seen":"2026-03-08"},{"id":"CS-CODE-012","domains":["code"],"pattern":"Credential-present implies validation-required — if a secret/key exists in env, the endpoint MUST verify it before proceeding","example":"const key = request.headers.get('Authorization')?.replace('Bearer ', ''); if (key !== env.API_KEY) return new Response('Unauthorized', {status: 401}); // THEN process request","effectiveness":0.92,"seen_count":1,"first_seen":"2026-03-09","last_seen":"2026-03-09"},{"id":"CS-CODE-013","domains":["code"],"pattern":"Fail-closed pattern for secrets — if secret is missing from env, reject request rather than falling through to default/open access","example":"const secret = env.WEBHOOK_SECRET; if (!secret) { console.error('WEBHOOK_SECRET not configured'); return new Response('Server misconfigured', {status: 500}); }","effectiveness":0.9,"seen_count":1,"first_seen":"2026-03-09","last_seen":"2026-03-09"},{"id":"CS-CODE-014","domains":["code","webdesign"],"pattern":"All DB text fields require escapeHtml() before HTML template interpolation — never trust stored data in server-side rendering","example":"const title = escapeHtml(row.title); const html = `<h1>${title}</h1>`; // Even DB data could contain injected HTML from previous unvalidated input","effectiveness":0.88,"seen_count":3,"first_seen":"2026-03-09","last_seen":"2026-03-09"},{"id":"CS-CODE-015","domains":["code"],"pattern":"Query params and path segments treated as hostile input — validate type, length, and format before use","example":"const id = parseInt(url.searchParams.get('id')); if (isNaN(id) || id < 1 || id > 100000) return new Response('Invalid ID', {status: 400}); // Then use in prepared statement","effectiveness":0.85,"seen_count":2,"first_seen":"2026-03-09","last_seen":"2026-03-09"},{"id":"CS-CODE-016","domains":["code"],"pattern":"Cost-bearing endpoints require auth BEFORE external API call
