name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package version (tag triggers only)
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PKG_VER="v$(node -p "require('./package.json').version")"
          TAG_VER="${GITHUB_REF#refs/tags/}"
          echo "Package: $PKG_VER  Tag: $TAG_VER"
          if [ "$PKG_VER" != "$TAG_VER" ]; then
            echo "::error::Tag $TAG_VER does not match package version $PKG_VER"
            exit 1
          fi

      - name: Install dependencies (root)
        run: npm ci || npm install

      - name: Verify the package contents
        run: npm pack --dry-run

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_1 }}
