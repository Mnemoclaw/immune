# ============================================================
# Immune System — Configuration v5.1.0
# ============================================================
# Hybrid adaptive system: Cheatsheet (positive) + Immune (negative)
# Search: Local embeddings (primary) + SQLite FTS4 (secondary), fused via RRF
# Adapter CLI: immune-adapter.js (standalone, no external services needed)
# Can be used independently (/immune) or by Chimera.
# ============================================================

immune:
  version: "5.1.0"
  # Model used for immune scanning (cheap/fast model recommended).
  # "haiku" is a logical alias resolved by Claude Code via env vars:
  #   ANTHROPIC_DEFAULT_HAIKU_MODEL  — set to your provider's fast/cheap model
  #   ANTHROPIC_DEFAULT_SONNET_MODEL — the balanced tier (used by /immune full mode)
  #   ANTHROPIC_BASE_URL             — point at any Messages-API-compatible endpoint
  # Works with: Anthropic, OpenRouter, Mistral, GLM, Ollama, llama.cpp, vLLM, LM Studio, etc.
  # Only the *scan* step calls a model. Search, dedup, injection, scoring are fully local.
  scan_model: "haiku"
  memory_path: "immune_memory.json"
  cheatsheet_path: "cheatsheet_memory.json"
  auto_add_threats: true
  auto_add_strategies: true
  severity_levels: [critical, warning, info]
  domains_multi: true  # antibodies/strategies use "domains" array, not single "domain"

# Tiered memory — keeps active set small for optimal Haiku performance
# Benchmark showed sweet spot at 13-20 antibodies (F1=0.94)
# Beyond 20, precision drops (more false positives)
tiers:
  hot:
    max_per_scan: 15
    # An antibody/strategy is HOT if ANY of these conditions is true:
    criteria:
      - "severity == critical"       # antibodies only
      - "effectiveness >= 0.7"       # strategies only
      - "seen_count >= 3"
      - "last_seen < 30 days ago"
  cold:
    # COLD items are sent as a one-line topic summary (not full details)
    summary_format: "comma-separated pattern keywords"
    # If scanner detects something matching a COLD item → reactivate it
    reactivation: true

# Cheatsheet — positive patterns injected BEFORE generation
cheatsheet:
  max_hot: 15
  # Strategy ID prefix per domain (e.g., CS-FITNESS-001)
  id_prefix:
    fitness: "CS-FITNESS"
    code: "CS-CODE"
    writing: "CS-WRITING"
    research: "CS-RESEARCH"
    strategy: "CS-STRATEGY"
    webdesign: "CS-WEBDESIGN"
    _global: "CS-GLOBAL"
    travel: "CS-TRAVEL"
  # Default effectiveness for new strategies (0.0-1.0)
  default_effectiveness: 0.5
  # Strategies below this effectiveness are candidates for removal
  min_effectiveness: 0.2

# Domain hints for auto-detection
# You can add custom domains or edit keywords to match your content
domain_keywords:
  code: ["function", "class", "import", "const", "let", "var", "def", "return", "async", "await", "SQL", "API", "endpoint", "worker", "fetch", "query"]
  fitness: ["séries", "reps", "exercice", "muscle", "squat", "curl", "programme", "entraînement", "sets", "workout", "deload", "hypertrophie"]
  writing: ["paragraphe", "article", "rédaction", "contenu", "SEO", "paragraph", "content", "blog", "D1", "traduction", "FAQ", "musculation blog", "slug"]
  research: ["source", "étude", "analyse", "hypothèse", "study", "analysis", "findings"]
  strategy: ["marché", "compétiteur", "ROI", "market", "competitor", "revenue", "pivot"]
  webdesign: ["CSS", "HTML", "responsive", "CTA", "landing page", "UI", "UX", "layout"]
  travel: ["voyage", "travel", "viaje", "plage", "beach", "hôtel", "hotel", "tourisme", "tourism", "itinéraire", "budget", "sécurité", "safety", "transport", "visa", "El Salvador", "destination", "guide"]

# ============================================================
# Adapter + SQLite + Migration
# ============================================================

adapter:
  script: "immune-adapter.js"
  db_path: "immune.sqlite"

indexing:
  max_chunks: 2000
  chunk_size_tokens: 400
  chunk_overlap_tokens: 80
  engine: "fts4"
  tokenizer: "porter"

locking:
  enabled: true
  stale_ms: 10000
  retries: 5

sanitizer:
  enabled: true

# ============================================================
# ContextMemory + Score + Flush
# ============================================================

context_memory:
  log_dir: "context"
  retention_hot_days: 90
  archive_dir: "context/archive"
  index_memory_md: true
  memory_md_path: "../MEMORY.md"
  user_md_path: "USER.md"

scoring:
  base: 100
  deductions:
    critical: 20
    warning: 10
    info: 5
  default_baseline:
    mean: 75
    std: 10

deduplication:
  engine: "auto"            # "auto" (embeddings if available, else jaccard) | "embeddings" | "jaccard"
  model: "Xenova/all-MiniLM-L6-v2"   # Local embedding model (384 dims, ~22MB, WASM)
  threshold_embedding: 0.7   # Cosine similarity threshold (natural gap: non-dup <0.56, dup >0.74)
  threshold_jaccard: 0.55    # Score threshold for Jaccard fallback
  weights:                   # Jaccard fallback weights
    jaccard: 0.5             # Word overlap (Jaccard index)
    substring: 0.3           # Longest common contiguous word sequence
    domain: 0.2              # Same domain bonus (1.0 if match, 0.0 if not)

flush:
  quality_gate: true
  min_pattern_length: 20
  require_fields:
    antibody: ["id", "pattern", "severity", "correction"]
    strategy: ["id", "pattern"]

# Housekeeping — memory limits + smart archival
housekeeping:
  max_antibodies: 500
  max_strategies: 300
  max_sqlite_mb: 50
  max_context_files: 500
  # Archive criteria (ALL must be true to archive):
  #   - COLD (not HOT)
  #   - severity != critical (antibodies) OR effectiveness < 0.3 (strategies)
  #   - seen_count <= 1 (never proved useful)
  #   - last_seen > 180 days ago
  # Archived items go to archived_antibodies.json / archived_strategies.json
  archive_after_days: 180
  archive_min_seen: 1